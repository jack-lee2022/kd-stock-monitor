<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Stock Monitor - 股票 KD 指標監控</title>
    <meta name="description" content="KD Stock Monitor - 台股美股 KD 指標監控系統">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kd-red': '#ef4444',
                        'kd-green': '#22c55e',
                        'kd-yellow': '#eab308',
                        'kd-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-chart-line text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">KD Stock Monitor</h1>
                        <p class="text-blue-200 text-sm">股票 KD 指標監控系統</p>
                    </div>
                </div>
                <div class="text-right">
                    <div id="last-updated" class="text-blue-200 text-sm">
                        <i class="fas fa-sync-alt mr-1"></i> 更新中...
                    </div>
                    <div class="text-xs text-blue-300 mt-1">資料來源: Yahoo Finance</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">監控股票數</p>
                        <p id="total-stocks" class="text-2xl font-bold text-gray-800">-</p>
                    </div>
                    <i class="fas fa-list text-gray-400 text-2xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-red-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">超買警告 (KD≥80)</p>
                        <p id="overbought-count" class="text-2xl font-bold text-red-600">-</p>
                    </div>
                    <i class="fas fa-arrow-up text-red-500 text-2xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">超賣提醒 (KD≤20)</p>
                        <p id="oversold-count" class="text-2xl font-bold text-green-600">-</p>
                    </div>
                    <i class="fas fa-arrow-down text-green-500 text-2xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">今日警示</p>
                        <p id="today-alerts" class="text-2xl font-bold text-yellow-600">-</p>
                    </div>
                    <i class="fas fa-bell text-yellow-500 text-2xl"></i>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex -mb-px">
                    <button onclick="filterStocks('all')" id="tab-all" class="tab-btn active px-6 py-3 border-b-2 border-blue-500 text-blue-600 font-medium">
                        全部股票
                    </button>
                    <button onclick="filterStocks('tw')" id="tab-tw" class="tab-btn px-6 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        台灣股市
                    </button>
                    <button onclick="filterStocks('us')" id="tab-us" class="tab-btn px-6 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        美股
                    </button>
                    <button onclick="filterStocks('alerts')" id="tab-alerts" class="tab-btn px-6 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        警示股票
                    </button>
                </nav>
            </div>
        </div>

        <!-- Stock Grid -->
        <div id="stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
            <!-- Stock cards will be inserted here -->
        </div>

        <!-- Alert History Section -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-history mr-2 text-blue-600"></i>警示歷史
                </h2>
            </div>
            <div id="alert-history" class="p-4">
                <!-- Alert items will be inserted here -->
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-chart-area mr-2 text-blue-600"></i>趨勢圖表
                </h2>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <label class="text-sm text-gray-600 mr-2">選擇股票:</label>
                    <select id="chart-stock-select" class="border border-gray-300 rounded px-3 py-1 text-sm">
                        <option value="">-- 選擇股票 --</option>
                    </select>
                </div>
                <div class="h-96">
                    <canvas id="stock-chart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 py-6">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm">
                <i class="fas fa-code mr-1"></i> KD Stock Monitor 
                <span class="mx-2">|</span>
                <i class="fas fa-github mr-1"></i> 
                <a href="https://github.com" class="hover:text-white transition">GitHub</a>
            </p>
            <p class="text-xs mt-2 text-gray-500">
                免責聲明: 本系統僅供參考，不構成投資建議。投資有風險，請自行判斷。
            </p>
        </div>
    </footer>

    <!-- Scripts - with version to bypass cache -->
    <script src="js/data.js?v=202603230530"></script>
    <script src="js/app.js?v=202603230530"></script>
</body>
</html>
