<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Stock Monitor - 股票 KD 指標監控</title>
    <meta name="description" content="KD Stock Monitor - 台股美股 KD 指標監控系統">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kd-red': '#ff3333',
                        'kd-green': '#00cc66',
                        'kd-yellow': '#eab308',
                        'kd-blue': '#4d96ff',
                        'dark-bg': '#0a0a0a',
                        'dark-card': '#1a1a1a',
                        'dark-border': '#2a2a2a',
                        'dark-text': '#e0e0e0',
                        'dark-text2': '#888888',
                        'accent': '#00d4ff',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg min-h-screen text-dark-text">
    <!-- Header -->
    <header class="border-b border-dark-border" style="background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);">
        <div class="container mx-auto px-4 py-5">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-chart-line text-2xl text-accent"></i>
                    <div>
                        <h1 class="text-xl font-bold text-white">KD Stock Monitor</h1>
                        <p class="text-dark-text2 text-xs">股票 KD 指標監控系統</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-6 px-4 py-2 rounded-lg" style="background: rgba(255,255,255,0.05);">
                    <div class="text-center">
                        <p class="text-[10px] text-dark-text2 uppercase tracking-wider">VIX 恐慌指數</p>
                        <p id="macro-fng" class="font-bold text-lg">-</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-dark-text2 uppercase tracking-wider">美債 10Y</p>
                        <p id="macro-us10y" class="font-bold text-lg">-</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-dark-text2 uppercase tracking-wider">美元指數</p>
                        <p id="macro-dxy" class="font-bold text-lg">-</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-dark-text2 uppercase tracking-wider">比特幣 (USD)</p>
                        <p id="macro-btc" class="font-bold text-lg">-</p>
                    </div>
                </div>
                <div class="text-right">
                    <div id="last-updated" class="text-dark-text2 text-sm">
                        <i class="fas fa-sync-alt mr-1"></i> 更新中...
                    </div>
                    <div class="text-xs text-dark-text2 mt-1">資料來源: Yahoo Finance</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="dark-card rounded-lg p-4 border border-dark-border">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-text2 text-xs">監控股票數</p>
                        <p id="total-stocks" class="text-2xl font-bold text-white">-</p>
                    </div>
                    <i class="fas fa-list text-dark-text2 text-xl"></i>
                </div>
            </div>
            <div class="dark-card rounded-lg p-4 border border-dark-border">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-text2 text-xs">超買警告 (KD≥80)</p>
                        <p id="overbought-count" class="text-2xl font-bold text-kd-red">-</p>
                    </div>
                    <i class="fas fa-arrow-up text-kd-red text-xl"></i>
                </div>
            </div>
            <div class="dark-card rounded-lg p-4 border border-dark-border">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-text2 text-xs">超賣提醒 (KD≤20)</p>
                        <p id="oversold-count" class="text-2xl font-bold text-kd-green">-</p>
                    </div>
                    <i class="fas fa-arrow-down text-kd-green text-xl"></i>
                </div>
            </div>
            <div class="dark-card rounded-lg p-4 border border-dark-border">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-text2 text-xs">今日警示</p>
                        <p id="today-alerts" class="text-2xl font-bold text-kd-yellow">-</p>
                    </div>
                    <i class="fas fa-bell text-kd-yellow text-xl"></i>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="dark-card rounded-lg border border-dark-border mb-6 overflow-hidden">
            <div class="border-b border-dark-border">
                <nav class="flex -mb-px">
                    <button onclick="filterStocks('all')" id="tab-all" class="tab-btn active px-5 py-3 border-b-2 border-accent text-accent font-medium text-sm">
                        全部股票
                    </button>
                    <button onclick="filterStocks('tw')" id="tab-tw" class="tab-btn px-5 py-3 border-b-2 border-transparent text-dark-text2 hover:text-dark-text text-sm">
                        台灣股市
                    </button>
                    <button onclick="filterStocks('us')" id="tab-us" class="tab-btn px-5 py-3 border-b-2 border-transparent text-dark-text2 hover:text-dark-text text-sm">
                        美股
                    </button>
                    <button onclick="filterStocks('alerts')" id="tab-alerts" class="tab-btn px-5 py-3 border-b-2 border-transparent text-dark-text2 hover:text-dark-text text-sm">
                        警示股票
                    </button>
                </nav>
            </div>
        </div>

        <!-- Stock Grid -->
        <div id="stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
            <!-- Stock cards will be inserted here -->
        </div>

        <!-- Chart Section -->
        <div id="chart-section" class="dark-card rounded-lg border border-dark-border mb-6 relative">
            <div class="px-5 py-3 border-b border-dark-border flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center gap-3">
                    <i class="fas fa-chart-candlestick text-accent"></i>
                    <h2 class="text-base font-bold text-white">趨勢圖表</h2>
                </div>
                <div class="flex items-center gap-2">
                    <select id="chart-stock-select" class="bg-dark-bg border border-dark-border rounded px-3 py-1.5 text-sm text-dark-text focus:outline-none focus:border-accent">
                        <option value="">-- 選擇股票 --</option>
                    </select>
                    <div class="flex rounded-lg overflow-hidden border border-dark-border">
                        <button class="tf-btn active px-3 py-1.5 text-xs bg-dark-bg text-dark-text hover:bg-dark-border transition" data-tf="day" onclick="StockChart.switchTimeframe('day')">日K</button>
                        <button class="tf-btn px-3 py-1.5 text-xs bg-dark-bg text-dark-text2 hover:bg-dark-border transition" data-tf="week" onclick="StockChart.switchTimeframe('week')">週K</button>
                        <button class="tf-btn px-3 py-1.5 text-xs bg-dark-bg text-dark-text2 hover:bg-dark-border transition" data-tf="month" onclick="StockChart.switchTimeframe('month')">月K</button>
                    </div>
                    <button onclick="StockChart.toggleFullscreen()" class="px-3 py-1.5 text-xs rounded-lg border border-dark-border text-dark-text2 hover:text-accent hover:border-accent transition">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
            <div class="p-2">
                <div id="stock-chart" style="width: 100%; height: 700px;"></div>
            </div>
        </div>

        <!-- Alert History Section -->
        <div class="dark-card rounded-lg border border-dark-border mb-6">
            <div class="px-5 py-3 border-b border-dark-border">
                <h2 class="text-base font-bold text-white">
                    <i class="fas fa-history mr-2 text-accent"></i>警示歷史
                </h2>
            </div>
            <div id="alert-history" class="p-4">
                <!-- Alert items will be inserted here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-dark-border py-6" style="background: #0d1117;">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-dark-text2">
                <i class="fas fa-code mr-1"></i> KD Stock Monitor
                <span class="mx-2">|</span>
                <i class="fas fa-github mr-1"></i>
                <a href="https://github.com/jack-lee2022/kd-stock-monitor" class="hover:text-white transition" target="_blank">GitHub</a>
            </p>
            <p class="text-xs mt-2 text-dark-text2 opacity-60">
                免責聲明: 本系統僅供參考，不構成投資建議。投資有風險，請自行判斷。
            </p>
        </div>
    </footer>

    <!-- Scripts - force refresh -->
    <script src="js/data.js?v=202604260300"></script>
    <script src="js/chart.js?v=202604260300"></script>
    <script src="js/app.js?v=202604260300"></script>
</body>
</html>
