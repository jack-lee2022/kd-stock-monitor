name: Hourly Stock Update & Deploy

on:
  schedule:
    # 每小時執行一次 (例如 01:00, 02:00...)
    - cron: '0 * * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允許手動觸發測試

permissions:
  contents: write
  pages: write
  id-token: write

# 設定全域環境變數為台灣時區
env:
  TZ: Asia/Taipei

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 啟用 pip 快取，加快套件安裝速度
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run stock data update
        run: |
          echo "開始更新資料 (台灣時間): $(date)"
          cd src
          python main.py
          echo "更新完成 (台灣時間): $(date)"
        
      - name: Check for changes
        id: check_changes
        run: |
          # 檢查 data 資料夾是否有變動
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "偵測到資料變動"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "資料無變動"
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          # Commit 訊息會自動使用台灣時間
          git commit -m "📊 自動更新資料 - $(date +'%Y-%m-%d %H:%M') (台北時間)"
          git push
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare docs folder
        run: |
          # 確保最新的 data 檔案被複製到 docs/data 以供網頁讀取
          mkdir -p docs/data
          cp -r data/* docs/data/ 2>/dev/null || true
          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
