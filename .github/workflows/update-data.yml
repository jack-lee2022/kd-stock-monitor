name: Update Stock Data

on:
  schedule:
    # Taiwan Stock Market (TWSE): 09:00-13:30 CST+8
    # Updates every hour during trading + 2 hours after close
    - cron: '0 1-5 * * 1-5'    # 09:00-13:00 CST+8, hourly
    - cron: '30 7 * * 1-5'     # 15:30 CST+8, 2 hours after TW close
    
    # US Stock Market: 21:30-04:00 CST+8 (next day)
    # Updates every hour during trading + 2 hours after close
    - cron: '30 13-19 * * 1-5' # 21:30-03:30 CST+8, hourly
    - cron: '0 22 * * 1-5'     # 06:00 CST+8, 2 hours after US close
    
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run stock data update
      run: |
        cd src
        python main.py
        
    - name: Check if data files changed
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Sync data to docs folder for GitHub Pages
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        # Copy updated data to docs folder for GitHub Pages deployment
        cp -r data/*.json docs/data/
        cp -r data/*_kd.csv docs/data/ 2>/dev/null || true
        cp -r data/*_raw.csv docs/data/ 2>/dev/null || true
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ docs/data/
        git commit -m "📊 Update stock data - $(date +'%Y-%m-%d %H:%M UTC')"
        git push
        
    - name: Create summary
      run: |
        echo "## 📊 Stock Data Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ steps.check_changes.outputs.changed == 'true' && '✅ Data updated' || '⚡ No changes' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f data/summary.json ]; then
          echo "### Summary Stats" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat data/summary.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi