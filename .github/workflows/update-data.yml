name: Update Stock Data

on:
  schedule:
    # 每小時更新一次（UTC時間）
    # 對應台灣時間：08:00, 09:00, 10:00, 11:00, 12:00, 13:00, 14:00, 15:00, 16:00, 17:00, 18:00, 19:00, 20:00, 21:00, 22:00, 23:00
    - cron: '0 * * * 1-5'
    
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run stock data update
      id: update
      run: |
        echo "Starting update at $(date)"
        cd src
        python main.py
        echo "Update completed at $(date)"
      continue-on-error: false
        
    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Data files changed"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No data changes"
        fi
        
    - name: Copy data to docs folder
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        echo "Copying data to docs folder..."
        cp -r data/*.json docs/data/
        cp -r data/*_kd.csv docs/data/ 2>/dev/null || true
        cp -r data/*_raw.csv docs/data/ 2>/dev/null || true
        echo "Data copied successfully"
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ docs/data/
        git commit -m "📊 Update stock data - $(date +'%Y-%m-%d %H:%M UTC')"
        git push
        echo "Changes pushed successfully"
